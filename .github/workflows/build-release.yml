name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download QSimpleUpdater
        shell: pwsh
        run: |
          mkdir 3rdparty -Force
          git clone https://github.com/alex-spataru/QSimpleUpdater.git 3rdparty/QSimpleUpdater

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.3
          host: windows
          arch: win64_msvc2019_64

      - name: Install NSIS
        run: choco install nsis -y

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Deploy Qt
        run: windeployqt build/Release/QtAutoUpdaterDemo.exe

      - name: Build Installer
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".Replace("v","")
          & "C:\Program Files (x86)\NSIS\makensis.exe" -DAPP_VERSION=$v -DBUILD_DIR=build installer/setup.nsi

      - name: Generate update.json
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".Replace("v","")
          $json = '[{"name":"QtAutoUpdaterDemo","version":"' + $ver + '","windows":{"download":"https://github.com/TasLR/QtAutoUpdaterDemo/releases/download/v' + $ver + '/QtAutoUpdaterDemo-Setup-' + $ver + '.exe","changelog":"Auto release"}}]'
          $json | Out-File update.json -Encoding utf8

      - name: Commit update.json
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI release"
          add: update.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: QtAutoUpdaterDemo-Setup-*.exe
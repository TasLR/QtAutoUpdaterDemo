name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download QSimpleUpdater
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path 3rdparty -Force | Out-Null
          git clone https://github.com/alex-spataru/QSimpleUpdater.git 3rdparty/QSimpleUpdater

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.3
          host: windows
          target: desktop
          arch: win64_msvc2019_64

      - name: Install NSIS
        run: choco install nsis -y

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      # 🔥 你的真实路径：build/Release/
      - name: Windeployqt
        run: windeployqt build/Release/QtAutoUpdaterDemo.exe

      # 🔥 正确 NSIS 路径
      - name: Make Installer
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".Replace("v", "")
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
              -DAPP_VERSION=$VERSION `
              -DBUILD_DIR=build `
              installer/setup.nsi

      - name: Update update.json
        shell: pwsh
        run: |
          $VER = "${{ github.ref_name }}".Replace("v", "")
          $REPO = "${{ github.repository }}"
          $TAG = "${{ github.ref_name }}"
          $URL = "https://github.com/$REPO/releases/download/$TAG/QtAutoUpdaterDemo-Setup-$VER.exe"
          $LOG = git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD
          if (-not $LOG) { $LOG = "- 优化体验" }

          $json = @(
              [PSCustomObject]@{
                  name    = "QtAutoUpdaterDemo"
                  version = $VER
                  windows = @{
                      download  = $URL
                      changelog = ($LOG -join "`n")
                  }
              }
          )
          $json | ConvertTo-Json -Depth 10 | Set-Content update.json -Encoding UTF8

      - name: Commit update.json
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI: 自动更新版本 ${{ github.ref_name }}"
          add: update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: QtAutoUpdaterDemo-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
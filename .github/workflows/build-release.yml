name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 自动下载 QSimpleUpdater（无需子模块，彻底解决报错）
      - name: Download QSimpleUpdater
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path 3rdparty -Force | Out-Null
          git clone https://github.com/alex-spataru/QSimpleUpdater.git 3rdparty/QSimpleUpdater

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.3
          host: windows
          target: desktop
          arch: win64_msvc2019_64

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files\NSIS\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Deploy Qt Libraries
        run: windeployqt build/Release/QtAutoUpdaterDemo.exe

      - name: Make Installer
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".Replace("v", "")
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
              -DAPP_VERSION=$VERSION `
              -DBUILD_DIR=build `
              installer/setup.nsi

      # 自动生成标准 QSimpleUpdater json
      - name: Update update.json
        shell: pwsh
        run: |
          $VER = "${{ github.ref_name }}".Replace("v", "")
          $REPO = "${{ github.repository }}"
          $TAG = "${{ github.ref_name }}"
          $URL = "https://github.com/$REPO/releases/download/$TAG/QtAutoUpdaterDemo-Setup-$VER.exe"

          $LOG = git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD
          if (-not $LOG) { $LOG = "- 优化体验，修复问题" }

          $json = @(
              [PSCustomObject]@{
                  name    = "QtAutoUpdaterDemo"
                  version = $VER
                  windows = [PSCustomObject]@{
                      download  = $URL
                      changelog = ($LOG -join "`n")
                  }
              }
          )

          $json | ConvertTo-Json -Depth 10 | Set-Content update.json -Encoding UTF8

      # 自动提交更新后的 json
      - name: Commit & Push update.json
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI: 自动更新 update.json ${{ github.ref_name }}"
          add: update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 发布 Release（已修复正确 Action）
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: QtAutoUpdaterDemo-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download QSimpleUpdater
        shell: pwsh
        run: |
          mkdir 3rdparty -Force
          git clone https://github.com/alex-spataru/QSimpleUpdater.git 3rdparty/QSimpleUpdater

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.3
          host: windows
          arch: win64_msvc201964

      - name: Install NSIS
        run: choco install nsis -y

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt
        run: windeployqt build/Release/QtAutoUpdaterDemo.exe

      - name: Copy files
        run: xcopy build\Release\* installer\ /E /H /Y

      - name: Make Installer
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".Replace("v","")
          & "C:\Program Files (x86)\NSIS\makensis.exe" -DAPP_VERSION=$v installer/setup.nsi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: QtAutoUpdaterDemo-Setup-*.exe
name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.3
          host: windows
          target: desktop
          arch: win64_msvc2019_64

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Windeployqt
        run: windeployqt build/release/bin/QtAutoUpdaterDemo.exe

      - name: Package with NSIS
        run: |
          choco install nsis
          $VERSION = "${{ github.ref_name }}".Replace("v", "")
          makensis -DAPP_VERSION=$VERSION -DBUILD_DIR=build installer/setup.nsi

      - name: Update update.json (QSimpleUpdater standard format)
        shell: pwsh
        run: |
          $VER = "${{ github.ref_name }}".Replace("v", "")
          $REPO = "${{ github.repository }}"
          $TAG = "${{ github.ref_name }}"
          $URL = "https://github.com/$REPO/releases/download/$TAG/QtAutoUpdaterDemo-Setup-$VER.exe"

          $LOG = git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD
          if (-not $LOG) { $LOG = "- Optimizations and fixes" }

          $json = @(
              [PSCustomObject]@{
                  name    = "QtAutoUpdaterDemo"
                  version = $VER
                  windows = [PSCustomObject]@{
                      download  = $URL
                      changelog = ($LOG -join "`n")
                  }
              }
          )

          $json | ConvertTo-Json -Depth 10 | Set-Content update.json -Encoding UTF8

      - name: Commit update.json
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI: auto update update.json ${{ github.ref_name }}"
          add: update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ 这里已修复：action-gh-release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: QtAutoUpdaterDemo-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}